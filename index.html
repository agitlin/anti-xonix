<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Air Xonix Clone</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="ui">
      <div>Level: <span id="level">1</span></div>
      <div>Score: <span id="score">0</span></div>
      <div>Lives: <span id="lives">3</span></div>
      <div>Progress: <span id="progress">0</span>%</div>
      <div id="active-powerups"></div>
    </div>
    <div id="collision-overlay" style="display: none;">
      <h1 id="collision-msg" class="retro-text">BOGUS!</h1>
      <p class="retro-subtext">PRESS SPACE TO RESUME</p>
    </div>

    <div id="pause-overlay" style="display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; flex-direction: column;">
      <h1 class="retro-text" style="color: #00ffff; text-shadow: 4px 4px 0 #ff00ff;">PAUSED</h1>
      <p class="retro-subtext">PRESS SPACE TO RESUME</p>
    </div>
    
    <div id="hof-overlay" style="display: none;">
      <h1 class="retro-text" style="font-size: 40px; color: #ffeb3b; text-shadow: 2px 2px #ff9800;">HALL OF FAME</h1>
      
      <div id="hof-input-section" style="display: none;">
        <p class="retro-subtext" style="color: #00e5ff; margin-bottom: 5px;">NEW HIGH SCORE!</p>
        <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px;">
          <input type="text" id="hof-initials" maxlength="15" autocomplete="off" placeholder="PLAYER" />
          <button id="hof-submit">SAVE</button>
        </div>
      </div>

      <table id="hof-table">
        <thead>
          <tr>
            <th>RNK</th>
            <th>NAME</th>
            <th>SCORE</th>
            <th>LVL</th>
          </tr>
        </thead>
        <tbody id="hof-body">
        </tbody>
      </table>
      
      <button id="hof-close-btn">CONTINUE</button>
    </div>

    <div id="game-over" style="display: none;">
      <h1 id="game-over-text">Game Over</h1>
      <button id="restart-btn">Restart</button>
      <div style="margin-top: 10px;">
        <button id="show-hof-btn" style="font-size: 16px; padding: 5px 10px;">View Hall of Fame</button>
      </div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
